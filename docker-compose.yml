services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api}
        NEXT_PUBLIC_FACE_MATCHING_URL: ${NEXT_PUBLIC_FACE_MATCHING_URL:-http://localhost:3010/prover/}
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_SERVICE_SID: ${TWILIO_SERVICE_SID:-}
      TWILIO_SMS_FROM: ${TWILIO_SMS_FROM:-}
      TWILIO_SMS_MESSAGING_SERVICE_SID: ${TWILIO_SMS_MESSAGING_SERVICE_SID:-}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started

  face-matching:
    build:
      context: .
      dockerfile: face_matching/Dockerfile
    ports:
      - "3010:80"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      REDIS_URL: redis://redis:6379/0
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_VERIFY_SERVICE_SID: ${TWILIO_VERIFY_SERVICE_SID:-}
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  redis-data:

